    <rect x="0" y="20" width="20" height="4" fill="#1864ab"/>
    <text x="-40" y="70" font-family="Arial" font-size="12" fill="#495057">Frontend (Waiter)</text>
  </g>
  <g transform="translate(390, 70)">
